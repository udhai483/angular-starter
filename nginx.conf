server {
    listen 8080; # Hardcode to 8080 for stability
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # This fixes the "MIME type" errors that cause timeouts
    include /etc/nginx/mime.types;
}